name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/package_extension.sh
      - run: ./scripts/package_extension.sh
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/chinese-video-notes-extension-*.zip
